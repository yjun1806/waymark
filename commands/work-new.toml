description = "Create a new Waymark issue doc (Why/How/Tasks/Decisions) in waymark/draft/"

prompt = """
Create a new Waymark issue document. Waymark = one issue = one thin file; the folder is the status; reference external truth, never copy it.

1. Read `.waymark.yml` (and `.waymark.local.yml` if present) for: `lang`, `repos` (alias → remote), `assignees` (github-id → prefix), and whether a `tracker` is configured.

2. Gather from the user / their request: the issue title, which repos it targets (MUST be aliases declared in `repos:`), and the planning-source link if any.

3. Allocate the `id`:
   - If a tracker is configured → use the tracker issue id (e.g. JIRA-123). Ask for it.
   - Else → resolve the current user's prefix from `assignees` (via `gh api user`, fallback git email), scan `waymark/**` for existing `<prefix>-<n>` ids, and use `<prefix>-<max+1>`. NEVER a shared global counter.

4. Create `waymark/draft/<id>-<slug>.md` from the plugin's issue template — find it at `${CLAUDE_PLUGIN_ROOT}/templates/work.template.md` or under `~/.claude/plugins/*waymark*/templates/`; if you can't locate it, reproduce the Why/How/Tasks/Decisions structure below:
   - `<slug>` = ASCII kebab of the title (transliterate if the title is non-ASCII). The filename is always ASCII.
   - Fill frontmatter: `id`, `title` (in `lang`), `summary` (one line, in `lang`), `assignee` (current github-id), `target` (repo aliases), `planning` (link, or omit if infra), `tracker` (link, or omit). Do NOT add a `status` field — the folder is the status.
   - Author the Why/How/Tasks/Decisions guidance and content in `lang`. At draft stage, fill `Why` (+ a rough `How`); leave the rest as headings.
   - Reference the planning source by link only. Never paste its content; a short DATED excerpt marked "non-authoritative, see link" is allowed.
   - Delete the template's HTML comments and <bracketed guidance> after filling.

5. Confirm the created path. Remind: it is in `draft/`. Status moves happen automatically as work progresses — Claude `git mv`s the doc per the workflow rules in CLAUDE.md (draft → approved after human approval → in-progress → done after the gate passes; done is frozen). Do not hand-edit any index.md.
"""
