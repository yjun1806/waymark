# waymark gate in CI — copy to .github/workflows/waymark.yml in your waymark DATA repo.
#
# Local git hooks are per-clone and skip merge commits, so CI is what actually
# guarantees the gate runs on every push/PR (closes the unmet-clone, merge-commit,
# and --no-verify bypasses). CI runs the gate only (id uniqueness, frontmatter,
# headings); it does not need the index generator.
#
# `waymark-check.py` must be available in the job. Two options:
#   A) vendor it — commit hooks/waymark-check.py into your repo (simplest), or
#   B) fetch it from the plugin repo at run time (uncomment the fetch step; the
#      plugin repo must be readable by the runner — public, or use a token).
name: waymark
on: [push, pull_request]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # B) fetch from the plugin (public repo):
      # - run: curl -fsSL https://raw.githubusercontent.com/yjun1806/waymark/main/hooks/waymark-check.py -o waymark-check.py
      - name: Run waymark gate
        run: python3 waymark-check.py .   # adjust path if vendored elsewhere
